services:
  - type: web
    name: flipandsiftone
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        length: 32
      - key: VITE_APP_TITLE
        value: FlipandSift
      - key: VITE_DISABLE_MANUS_RUNTIME
        value: "true"
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
        required: true
