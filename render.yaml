services:
  - type: web
    name: flipandsiftone
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        length: 32
      - key: DATABASE_URL
        sync: false
        required: true
